name: Visual Regression (reusable)

# Reusable visual-regression pipeline shared across the arcxp org.
#
# Lives in arcxp/themes-blocks. Callers invoke it with:
#   jobs:
#     vr:
#       uses: arcxp/themes-blocks/.github/workflows/visual-regression.yml@<ref>
#       with:
#         engine_version: <canary-tag>   # default: latest
#         link_blocks: false             # true = link local themes blocks
#       secrets:
#         CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
#         SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
#
# (Private-repo reuse must be enabled in themes-blocks' Actions settings.)
#
# Baseline   = live deployed pages (rendered by the CDN) — kept from the existing action.
# Comparison = the bundle running locally in the dev container.
# Two intended usages:
#   - engine repo:   engine_version=<canary>, link_blocks=false  -> catch engine regressions
#   - themes change: engine_version=latest,   link_blocks=true   -> catch block regressions

on:
  workflow_call:
    inputs:
      engine_version:
        description: "Fusion engine release / image tag to render with"
        type: string
        required: false
        default: "latest"
      link_blocks:
        description: "Link this repo's local themes blocks (true) or use published blocks (false)"
        type: boolean
        required: false
        default: false
      # --- Baseline (live deployed pages) — carried over from the existing action. ---
      # TODO confirm whether these should stay inputs or be hardcoded constants.
      base_url:
        description: "Baseline CDN base URL (no path / query)"
        type: string
        required: false
        default: "https://themesinternal-the-gazette-sandbox.web.arc-cdn.net"
      url_params:
        description: "Query params appended to BOTH local and baseline URLs (only the host differs)"
        type: string
        required: false
        default: "_website=the-gazette&mxId=0f3c88a6"
      # --- which themes-blocks ref to check out (the bundle + devcontainer live here) ---
      # TODO confirm default ref (release branch vs the @<ref> used in `uses:`).
      themes_ref:
        description: "Ref of arcxp/themes-blocks to check out for the bundle"
        type: string
        required: false
        default: "arc-themes-release-version-4.1.0"
    secrets:
      CHROMATIC_PROJECT_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
      # Caller-owned: a token for cross-repo themes-blocks checkout and/or the
      # .npmrc used to install @wpmedia blocks during the bundle build.
      # PACKAGES_TOKEN:
      #   required: false

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENGINE_VERSION: ${{ inputs.engine_version }}
      LINK_BLOCKS: ${{ inputs.link_blocks }}
      BASE_URL: ${{ inputs.base_url }}
      # Same path + query for both renders; only the host differs.
      URL_PARAMS: ${{ inputs.url_params }}
      # PORT defaults to 80 (compose maps ${PORT:-80}:8080), CONTEXT_PATH defaults to "pf".
      LOCAL_BASE_URL: "http://localhost/pf"
      # In-container checkout path (devcontainer workspaceFolder).
      THEMES_BLOCKS_REPO: "/workspaces/themes-blocks"
      CHROMATIC_BRANCH: visual-regression-${{ github.run_id }}
    steps:
      - name: Checkout themes-blocks (the bundle + devcontainer live here)
        uses: actions/checkout@v4
        with:
          repository: arcxp/themes-blocks
          ref: ${{ inputs.themes_ref }}
          fetch-depth: 0
          # token: ${{ secrets.PACKAGES_TOKEN }}   # TODO cross-repo private checkout

      # ====================== HOST SETUP ===================================
      - name: Setup Node + install deps + Playwright (host)
        run: |
          # setup-node (.nvmrc), npm ci, npm install playwright,
          # npx playwright install --with-deps chromium
