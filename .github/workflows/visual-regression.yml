name: Visual Regression - Deployment Comparison

on:
  # TODO: Remove push trigger after testing — only workflow_dispatch should remain
  push:
    branches:
      - playwright-chromatic-action
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL (without path or d parameter)"
        required: true
        default: "https://themesinternal-the-gazette-sandbox.web.arc-cdn.net"
      url_params:
        description: "Query parameters appended to all URLs"
        required: true
        default: "_website=daily-intelligencer&mxId=0f3c88a6"
      deployment_id:
        description: "Deployment ID for comparison (appended as d= parameter)"
        required: false
        default: "11"

jobs:
  compare:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://themesinternal-the-gazette-sandbox.web.arc-cdn.net' }}
      URL_PARAMS: ${{ github.event.inputs.url_params || '_website=daily-intelligencer&mxId=0f3c88a6' }}
      DEPLOYMENT_ID: ${{ github.event.inputs.deployment_id || '11' }}
      CHROMATIC_BRANCH: visual-regression-${{ github.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: "https://npm.pkg.github.com"

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Create temp branch for Chromatic comparison
        run: |
          git checkout -b $CHROMATIC_BRANCH
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      - name: Generate stories from pages config
        run: node visual-regression/generate-stories.mjs

      # --- Baseline ---
      - name: Capture baseline screenshots
        run: node visual-regression/capture.mjs "$BASE_URL" "$URL_PARAMS"

      - name: Commit baseline screenshots
        run: |
          git add -f visual-regression/screenshots/ visual-regression/stories/
          git commit -m "visual regression baseline"

      - name: Build baseline Storybook
        run: npx storybook build --config-dir visual-regression/.storybook -o visual-regression/storybook-static

      - name: Publish baseline to Chromatic
        run: |
          npx chromatic \
            --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }} \
            --storybook-build-dir=visual-regression/storybook-static \
            --branch-name=$CHROMATIC_BRANCH \
            --auto-accept-changes \
            --exit-zero-on-changes \
            --allow-console-errors

      # --- Comparison ---
      - name: Capture comparison screenshots
        run: node visual-regression/capture.mjs "$BASE_URL" "$URL_PARAMS" "$DEPLOYMENT_ID"

      - name: Commit comparison screenshots
        run: |
          git add -f visual-regression/screenshots/
          git commit --allow-empty -m "visual regression comparison"

      - name: Build comparison Storybook
        run: npx storybook build --config-dir visual-regression/.storybook -o visual-regression/storybook-static

      - name: Publish comparison to Chromatic
        run: |
          npx chromatic \
            --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }} \
            --storybook-build-dir=visual-regression/storybook-static \
            --branch-name=$CHROMATIC_BRANCH \
            --allow-console-errors

      - name: Print Chromatic results
        if: always()
        run: |
          echo "Check Chromatic dashboard for branch: $CHROMATIC_BRANCH"
